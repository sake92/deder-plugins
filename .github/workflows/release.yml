name: Release
on:
  push:
    tags:
      - "*"

env:
  DEDER_SONATYPE_PGP_PASSPHRASE: ${{ secrets.PGP_PASSPHRASE }}
  DEDER_SONATYPE_PGP_SECRET: ${{ secrets.PGP_SECRET }}
  DEDER_SONATYPE_USERNAME: ${{ secrets.SONATYPE_USERNAME }}
  DEDER_SONATYPE_PASSWORD: ${{ secrets.SONATYPE_PASSWORD }}

jobs:
  tests:
    uses: ./.github/workflows/ci.yml
  publish:
    runs-on: ubuntu-latest
    needs: [ tests ]
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'
      - name: Set Homebrew env
        shell: bash
        run: echo "HOMEBREW_NO_SANDBOX_LINUX=1" >> $GITHUB_ENV
      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@main
      - name: Install deder
        run: |
          brew install sake92/tap/deder
      - name: Publish
        run: deder exec -t publish
